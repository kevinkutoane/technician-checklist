<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checklist – Technician Checklist</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>

<div class="app-layout">
  <aside class="sidebar">
    <a class="sidebar-brand" href="/">
      <span class="icon">💻</span>
      <span>Ops Hub</span>
    </a>
    <ul class="sidebar-nav" id="navLinks"></ul>
    <div class="sidebar-footer">
      <button class="btn btn-block btn-secondary btn-sm" id="logoutBtn">Logout</button>
    </div>
  </aside>

  <div class="main-content">
    <header class="top-header">
      <div class="top-header-user">
        <div class="user-profile">
          <div class="user-avatar" id="navAvatar">U</div>
          <span id="navUser">User Name</span>
        </div>
      </div>
    </header>

<div class="container">
  <h1 class="page-title">Submit Checklist</h1>

  <div class="card" id="selectClassroomCard">
    <div class="card-header">
      <span class="card-title">Select Classroom</span>
    </div>
    <div class="form-group mb-1">
      <label class="form-label" for="classroomSelect">Classroom</label>
      <select class="form-control" id="classroomSelect">
        <option value="">-- Select a classroom --</option>
      </select>
    </div>
    <div class="form-group mt-2">
      <label class="form-label" for="submissionDate">Date</label>
      <input class="form-control" type="date" id="submissionDate" />
    </div>
  </div>

  <div id="checklistForm" class="hidden">
    <div id="existingAlert" class="alert alert-warning hidden">
      ⚠️ A checklist has already been submitted for this classroom today. Submitting will overwrite it.
    </div>

    <div id="equipmentList"></div>

    <div class="card">
      <div class="card-header"><span class="card-title">General Notes</span></div>
      <div class="form-group mb-1">
        <textarea class="form-control" id="generalNotes" placeholder="Any general observations or notes for this classroom…"></textarea>
      </div>
    </div>

    <div id="submitError" class="alert alert-danger hidden"></div>
    <div id="submitSuccess" class="alert alert-success hidden"></div>

    <div class="flex gap-2 mt-3">
      <button class="btn btn-secondary" id="cancelBtn">Cancel</button>
      <button class="btn btn-primary" id="submitBtn" style="flex:1">
        Submit Checklist
      </button>
    </div>
  </div>

  <div id="loadingSpinner" class="hidden">
    <div class="spinner"></div>
  </div>
</div>
</div>
</div>

<script src="/js/checklist.js"></script>
</body>
</html>
