<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Manage and track IT equipment loan records." />
  <meta name="theme-color" content="#4f46e5" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/icons/icon.svg" />
  <title>Equipment Loans – Technician Checklist</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <script>try{var _t=localStorage.getItem('opsHubTheme');if(_t)document.documentElement.setAttribute('data-theme',_t);}catch(e){}</script>
</head>
<body>

<div class="app-layout">
  <aside class="sidebar" aria-label="Main navigation">
    <a class="sidebar-brand" href="/">
      <span class="icon">💻</span>
      <span>Ops Hub</span>
    </a>
    <ul class="sidebar-nav" id="navLinks"></ul>
    <div class="sidebar-footer">
      <button class="btn btn-block btn-secondary btn-sm" id="logoutBtn">Logout</button>
    </div>
  </aside>

  <div class="main-content">
    <header class="top-header">
      <div class="top-header-user">
        <div class="user-profile">
          <div class="user-avatar" id="navAvatar">U</div>
          <span id="navUser">User Name</span>
        </div>
      </div>
    </header>

    <div class="container">
      <h1 class="page-title">Equipment Loans</h1>

      <div class="row">
        <!-- Log New Loan -->
        <div class="col-5">
          <div class="card">
            <div class="card-header">
              <span class="card-title">Log New Loan</span>
            </div>

            <div id="loanSuccess" class="alert alert-success mt-3 hidden"></div>
            <div id="loanError" class="alert alert-danger mt-3 hidden"></div>

            <form id="loanForm">
              <div class="form-group mb-3">
                <label class="form-label">Borrower Name *</label>
                <input type="text" class="form-control" id="borrowerName" placeholder="e.g. John Smith" required />
              </div>

              <div class="form-group mb-3">
                <label class="form-label">Item *</label>
                <input type="text" class="form-control" id="itemDescription" placeholder="e.g. Laptop Charger, Mouse, HDMI Cable" required />
              </div>

              <div class="form-group mb-3">
                <label class="form-label">Notes <small style="color:var(--text-muted)">(optional)</small></label>
                <input type="text" class="form-control" id="loanNotes" placeholder="e.g. Returns after 14:00" />
              </div>

              <button type="button" class="btn btn-primary btn-block mt-2" id="submitLoanBtn">📋 Log Loan</button>
            </form>
          </div>
        </div>

        <!-- Loans List -->
        <div class="col-7">
          <div class="card">
            <div class="card-header" style="display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap;">
              <span class="card-title" style="flex:1;">Loans</span>
              <div class="tabs" style="margin:0;gap:0.4rem;">
                <button class="tab-btn active" id="tabOutstanding">Outstanding</button>
                <button class="tab-btn" id="tabAll">All History</button>
              </div>
            </div>
            <div id="loansList">
              <div class="spinner"></div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="/js/nav.js"></script>
<script src="/js/loans.js"></script>
<script>if('serviceWorker'in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});</script>
</body>
</html>
