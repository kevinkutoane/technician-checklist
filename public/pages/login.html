<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Sign in to the Technician Checklist management system." />
  <meta name="theme-color" content="#4f46e5" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/icons/icon.svg" />
  <title>Login – GIBS Ops Hub</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <script>try{var _t=localStorage.getItem('opsHubTheme');if(_t)document.documentElement.setAttribute('data-theme',_t);}catch(e){}</script>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <span class="icon">📋</span>
      <h1>GIBS Ops Hub</h1>
      <p>Daily Equipment Monitoring and Employee Onboarding System</p>
    </div>

    <div id="loginError" class="alert alert-danger hidden"></div>
    <div id="loginSuccess" class="alert alert-success hidden"></div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input
          class="form-control"
          type="text"
          id="username"
          name="username"
          placeholder="Enter username"
          autocomplete="username"
          required
        />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input
          class="form-control"
          type="password"
          id="password"
          name="password"
          placeholder="Enter password"
          autocomplete="current-password"
          required
        />
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" id="loginBtn">
        Sign In
      </button>
      <div style="text-align:center;margin-top:0.75rem">
        <a href="/reset-password" style="font-size:0.875rem;color:var(--gray-500)">
          Forgot password?
        </a>
      </div>
    </form>
  </div>
</div>
<script src="/js/login.js"></script>
<script>if('serviceWorker'in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});</script>
</body>
</html>
