<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#4f46e5" />
  <title>Reset Password – Technician Checklist</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <span class="icon">📋</span>
      <h1>Technician Checklist</h1>
    </div>

    <!-- ── Forgot-password view (default) ──────────────────────────── -->
    <div id="forgotView">
      <h2 style="font-size:1.25rem;margin-bottom:0.25rem">Forgot Password</h2>
      <p style="color:var(--gray-500);font-size:0.9rem;margin-bottom:1.25rem">
        Enter your admin username or email address and we will send you a reset link.
      </p>

      <div id="forgotError" class="alert alert-danger hidden"></div>
      <div id="forgotSuccess" class="alert alert-success hidden"></div>

      <form id="forgotForm">
        <div class="form-group">
          <label class="form-label" for="identifier">Username or Email</label>
          <input
            class="form-control"
            type="text"
            id="identifier"
            name="identifier"
            placeholder="Enter your username or email"
            autocomplete="username"
            required
          />
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="forgotBtn">
          Send Reset Link
        </button>
      </form>

      <div style="text-align:center;margin-top:1rem">
        <a href="/" style="font-size:0.875rem;color:var(--gray-500)">Back to login</a>
      </div>
    </div>

    <!-- ── Reset-password view (shown when ?token= is present) ─────── -->
    <div id="resetView" class="hidden">
      <h2 style="font-size:1.25rem;margin-bottom:0.25rem">Choose a New Password</h2>
      <p style="color:var(--gray-500);font-size:0.9rem;margin-bottom:1.25rem">
        Your new password must be at least 8 characters.
      </p>

      <div id="resetError" class="alert alert-danger hidden"></div>

      <form id="resetForm">
        <div class="form-group">
          <label class="form-label" for="newPassword">New Password</label>
          <input
            class="form-control"
            type="password"
            id="newPassword"
            name="newPassword"
            placeholder="Min 8 characters"
            autocomplete="new-password"
            required
            minlength="8"
          />
        </div>
        <div class="form-group">
          <label class="form-label" for="confirmPassword">Confirm Password</label>
          <input
            class="form-control"
            type="password"
            id="confirmPassword"
            name="confirmPassword"
            placeholder="Repeat new password"
            autocomplete="new-password"
            required
            minlength="8"
          />
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="resetBtn">
          Reset Password
        </button>
      </form>
    </div>

  </div>
</div>
<script src="/js/reset-password.js"></script>
</body>
</html>
